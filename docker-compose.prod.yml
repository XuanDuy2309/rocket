version: "3.8"

services:
  nginx:
    image: nginx:alpine
    container_name: prod_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_ssl:/etc/nginx/ssl
    depends_on:
      - backend
    restart: always
    networks:
      - prod_network

  backend:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile
    container_name: prod_backend
    expose:
      - "8080"
    env_file:
      - ./backend/.env.production
    environment:
      - POSTGRES_URL=postgres://postgres:postgres@postgres:5432/rocket?sslmode=disable
      - REDIS_ADDR=redis:6379
      - S3_ENDPOINT=http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    networks:
      - prod_network

  postgres:
    image: postgres:16-alpine
    container_name: prod_postgres
    expose:
      - "5432"
    environment:
      POSTGRES_DB: rocket
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - prod_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - prod_network

  redis:
    image: redis:7-alpine
    container_name: prod_redis
    expose:
      - "6379"
    volumes:
      - prod_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: always
    networks:
      - prod_network

  minio:
    image: minio/minio:latest
    container_name: prod_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    expose:
      - "9000"
      - "9001"
    volumes:
      - prod_minio_data:/data
    restart: always
    networks:
      - prod_network

volumes:
  prod_pg_data:
  prod_redis_data:
  prod_minio_data:
  nginx_ssl:

networks:
  prod_network:
